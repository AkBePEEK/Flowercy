name: flowery_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.6.0
  social_login_buttons: ^1.0.7

  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_core_platform_interface: ^6.0.2

  google_sign_in: ^7.2.0

dev_dependencies:

  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.9.2

flutter:
  uses-material-design: true

  assets:
    - assets/flowers/homeScreen/
    - assets/flowers/signInScreen/
    - assets/flowers/flowersCategory/
    - assets/flowers/products/
    - assets/flowers/
    - assets/shopping_basket.png
    - assets/orderStatus/